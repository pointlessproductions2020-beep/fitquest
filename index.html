<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitQuest — Login</title>
    <link rel="stylesheet" href="loginstyles.css">

    <!-- ✅ Firebase v8 CDN scripts (REQUIRED) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <!-- Your firebase.js must load AFTER the Firebase SDKs -->
    <script defer src="firebase.js"></script>
</head>

<body class="neon-bg">

<div class="container">

    <!-- LEFT SIDE (DESKTOP) -->
    <div class="left-panel">
        <div class="logo-wrapper">
            <div class="glow-ring"></div>
            <img src="assets/neonlogo.png" class="logo">
        </div>
        <h2 class="tagline desktop-tagline">Your Journey Starts Here.</h2>
    </div>

    <!-- RIGHT SIDE (FORM) -->
    <div class="right-panel">
        <div class="form-card">
            <h2>Login</h2>

            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">

            <button onclick="loginUser()">Login</button>

            <p class="small-text"><a href="#">Forgot password</a></p>
            <p class="small-text">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>

</div>

<!-- MOBILE TAGLINE -->
<h2 class="tagline mobile-tagline">Your Journey Starts Here.</h2>

</body>
</html>
