<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitQuest — Login</title>
    <link rel="stylesheet" href="loginstyles.css">

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script defer src="firebase.js"></script>
</head>

<body class="auth-body">

<div class="auth-shell">

    <!-- LEFT HERO -->
    <section class="auth-hero">
        <div class="hero-inner">

            <!-- DUAL-LAYER NEON LOGO RING -->
            <div class="logo-ring">
                <div class="logo-ring-inner"></div>
                <img src="assets/logo.png" class="logo">
            </div>

            <h1 class="hero-title">FitQuest</h1>
            <p class="hero-subtitle">
                Turn your training into a quest. Track, level up, and keep your streak alive.
            </p>

            <ul class="hero-points">
                <li>Daily Logs keep you consistent</li>
                <li>Streaks reward your discipline</li>
                <li>Quests turn fitness into a game</li>
            </ul>
        </div>
    </section>

    <!-- RIGHT AUTH PANEL -->
    <section class="auth-panel">
        <div class="form-card glass-card">
            <h2 class="form-title">Welcome back</h2>
            <p class="form-subtitle">Log in to continue your journey.</p>

            <label class="field-label" for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com">

            <label class="field-label" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">

            <button class="primary-btn" onclick="loginUser()">Login</button>

            <p class="small-text"><a href="#">Forgot password?</a></p>
            <p class="small-text">Don't have an account? <a href="register.html">Create one</a></p>
        </div>
    </section>

</div>

<div class="auth-grid-overlay"></div>

</body>
</html>
