<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitQuest — Profile</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script defer src="firebase.js"></script>
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<aside class="profile-sidebar neon-card">

    <div class="avatar-wrapper neon-interactive" id="avatarWrapper">
        <div class="avatar-ring"></div>
        <div class="avatar-particles"></div>
        <img id="profileAvatar" class="avatar-img" src="assets/default-avatar.png">
        <label for="avatarUpload" class="avatar-camera">📷</label>
        <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
    </div>

    <button class="change-photo-btn neon-interactive" onclick="document.getElementById('avatarUpload').click()">
        Change Photo
    </button>

    <div class="sidebar-info">
        <h2 id="sidebarName" class="neon-text">Your Name</h2>
        <p id="sidebarAge">Age: –</p>
        <p id="sidebarSex">Sex: –</p>

        <div class="level-box">
            <p>Level <span id="userLevel">1</span></p>
            <div class="xp-bar">
                <div id="xpFill"></div>
            </div>
        </div>
    </div>

</aside>

<!-- MAIN CONTENT -->
<main class="profile-main">

    <h1 class="page-title">Your Character Sheet</h1>
    <p class="subtitle">Tune your stats. Power your quest.</p>

    <div class="profile-form neon-card">

        <label>Full Name</label>
        <input type="text" id="profileName">

        <label>Age</label>
        <input type="number" id="profileAge">

        <label>Sex</label>
        <select id="profileSex">
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Height (cm)</label>
        <input type="number" id="profileHeight">

        <label>Weight (kg)</label>
        <input type="number" id="profileWeight">

        <label>Activity Level</label>
        <select id="profileActivity">
            <option value="">Select</option>
            <option value="sedentary">Sedentary</option>
            <option value="light">Light</option>
            <option value="moderate">Moderate</option>
            <option value="active">Active</option>
            <option value="very_active">Very Active</option>
        </select>

        <label>Goal</label>
        <select id="profileGoal">
            <option value="">Select</option>
            <option value="lose">Lose Weight</option>
            <option value="maintain">Maintain Weight</option>
            <option value="gain">Gain Weight</option>
        </select>

        <label>Goal Pace</label>
        <select id="profileGoalPace">
            <option value="">Select</option>
            <option value="slow">Slow</option>
            <option value="medium">Medium</option>
            <option value="fast">Fast</option>
        </select>

        <button class="save-profile-btn neon-interactive" onclick="saveProfile()">Save Profile</button>

        <p id="profileStatus" class="small-text"></p>

        <hr class="divider">

        <h3 class="neon-text">Health Snapshot</h3>
        <p><strong>BMI:</strong> <span id="bmiValue">–</span></p>
        <p><strong>TDEE:</strong> <span id="tdeeValue">–</span> kcal</p>
        <p><strong>Daily Target Calories:</strong> <span id="targetCaloriesValue">–</span> kcal</p>

        <button class="back-btn neon-interactive" onclick="window.location.href='dashboard.html'">
            Back to Dashboard
        </button>

    </div>

</main>

<script src="profile.js"></script>

</body>
</html>
