<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitQuest — Register</title>
    <link rel="stylesheet" href="loginstyles.css">

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <script defer src="firebase.js"></script>

</head>

<body class="auth-body">

<div class="auth-shell">

    <!-- LEFT HERO -->
    <section class="auth-hero">
        <div class="hero-inner">

            <!-- DUAL-LAYER NEON LOGO RING -->
            <div class="logo-ring">
                <div class="logo-ring-inner"></div>
                <img src="assets/logo.png" class="logo">
            </div>

            <h1 class="hero-title">Join FitQuest</h1>
            <p class="hero-subtitle">
                Create your character, start your streak, and earn XP from real‑world effort.
            </p>

            <ul class="hero-points">
                <li>[Track workouts](ca://s?q=open_workouts)</li>
                <li>[Log meals](ca://s?q=open_food)</li>
                <li>[Complete quests](ca://s?q=open_quests)</li>
            </ul>
        </div>
    </section>

    <!-- RIGHT AUTH PANEL -->
    <section class="auth-panel">
        <div class="form-card glass-card">
            <h2 class="form-title">Create account</h2>
            <p class="form-subtitle">It takes less than a minute.</p>

            <label class="field-label" for="regName">Full name</label>
            <input type="text" id="regName" placeholder="Alex Quest">

            <label class="field-label" for="regEmail">Email</label>
            <input type="email" id="regEmail" placeholder="you@example.com">

            <label class="field-label" for="regPassword">Password</label>
            <input type="password" id="regPassword" placeholder="Choose a strong password">

            <button class="primary-btn" onclick="registerUser()">Register</button>

            <p class="small-text">Already have an account? <a href="index.html">Login</a></p>
        </div>
    </section>

</div>

<div class="auth-grid-overlay"></div>

</body>
</html>
