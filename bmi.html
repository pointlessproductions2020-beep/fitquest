<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitQuest — BMI Calculator</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="firebase.js"></script>
    <script src="fitquestbrain.js"></script>

    <style>
        :root {
            --neon: #00eaff;
        }

        .bmi-container {
            max-width: 480px;
            margin: 40px auto;
            padding: 20px;
        }

        .bmi-card {
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--neon);
            box-shadow: 0 0 14px var(--neon), inset 0 0 6px var(--neon);
            animation: neonBreath 6s ease-in-out infinite;
        }

        .bmi-card h2 {
            margin-bottom: 12px;
        }

        .bmi-card label {
            font-size: 13px;
            opacity: 0.8;
        }

        .bmi-card input {
            width: 100%;
            padding: 10px;
            margin-top: 4px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid rgba(148,163,184,0.4);
            background: #020617;
            color: #e5e7eb;
        }

        .bmi-btn {
            width: 100%;
            padding: 12px;
            border-radius: 999px;
            border: none;
            background: var(--neon);
            color: #020617;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 18px var(--neon);
            margin-top: 10px;
        }

        .bmi-result {
            margin-top: 16px;
            font-size: 1.1rem;
            text-align: center;
        }

        .bmi-category {
            margin-top: 6px;
            font-size: 0.95rem;
            opacity: 0.85;
            text-align: center;
        }
    </style>
</head>

<body class="dashboard-body">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <img src="assets/logo.png" alt="FitQuest Logo">
    </div>

    <ul class="sidebar-links">
        <li class="neon-hover" onclick="window.location.href='dashboard.html'">🏠 Dashboard</li>
        <li class="neon-hover" onclick="window.location.href='exercise.html'">💪 Workout</li>
        <li class="neon-hover" onclick="window.location.href='food.html'">🍽️ Food Intake</li>
        <li class="neon-hover" onclick="window.location.href='meals.html'">🍱 Meals</li>
        <li class="neon-hover" onclick="window.location.href='barcode.html'">📷 Barcode Scanner</li>
        <li class="active neon-hover">📏 BMI Calculator</li>
        <li class="neon-hover" onclick="window.location.href='profile.html'">👤 Profile</li>
        <li class="neon-hover">📊 Progress</li>
        <li class="neon-hover">⚙️ Settings</li>
    </ul>

    <button class="logout-btn neon-interactive" onclick="logoutUser()">Logout</button>
</aside>

<!-- MAIN -->
<main class="main-content">
    <div class="bmi-container">
        <div class="bmi-card neon-card">
            <h2 class="neon-text">BMI Calculator</h2>

            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="e.g. 170">

            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g. 70">

            <button class="bmi-btn neon-interactive" onclick="calculateBMI()">Calculate BMI</button>

            <p id="bmiValue" class="bmi-result"></p>
            <p id="bmiCategory" class="bmi-category"></p>
        </div>
    </div>
</main>

<script>
let userRef = null;

auth.onAuthStateChanged(async user => {
    if (!user) return window.location.href = "index.html";

     await applyUserTheme();
    
    userRef = db.collection("users").doc(user.uid);
});

/* BMI CATEGORY HELPER */
function getBMICategory(bmi) {
    if (bmi < 18.5) return "Underweight";
    if (bmi < 25) return "Healthy";
    if (bmi < 30) return "Overweight";
    return "Obese";
}

/* MAIN BMI FUNCTION */
async function calculateBMI() {
    const h = parseFloat(document.getElementById("height").value);
    const w = parseFloat(document.getElementById("weight").value);

    if (!h || !w) {
        document.getElementById("bmiValue").innerText = "Enter height and weight.";
        return;
    }

    const bmi = w / Math.pow(h / 100, 2);
    const category = getBMICategory(bmi);

    document.getElementById("bmiValue").innerText = "BMI: " + bmi.toFixed(1);
    document.getElementById("bmiCategory").innerText = category;

    if (!userRef) return;

    // Save BMI + history
    await userRef.set({
        bmi: bmi,
        bmiHistory: firebase.firestore.FieldValue.arrayUnion({
            value: bmi,
            timestamp: Date.now()
        })
    }, { merge: true });

    // XP reward
    FitQuestBrain.awardXp(userRef, 5, "bmi_update");
}
</script>

</body>
</html>
